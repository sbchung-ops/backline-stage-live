name: Update Instagram posts

on:
  workflow_dispatch:
  schedule:
    # 3시간마다 확인 — 실제 게시물이 바뀐 경우에만 커밋(→ Netlify 빌드)된다.
    - cron: "23 */3 * * *"

permissions:
  contents: write

# YouTube 워크플로우와 같은 그룹으로 묶어 동시 실행을 막는다(양쪽 다 main/live 레포에 push·rsync --delete 하므로).
concurrency:
  group: site-auto-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      INSTAGRAM_POST_LIMIT: "6"
      # backline_stage_official 의 IG 비즈니스 계정 ID — 시스템 유저 토큰(EAA)이 이 ID로 직접 조회한다.
      INSTAGRAM_IG_USER_ID: "17841416414530516"
      SITE_URL: https://sbchung-ops.github.io/backline-stage-live
      LIVE_REPO: sbchung-ops/backline-stage-live
      CMS_API_URL: ${{ secrets.CMS_API_URL }}
      BACKLINE_STAGE_LIVE_TOKEN: ${{ secrets.BACKLINE_STAGE_LIVE_TOKEN }}
      GH_PAT: ${{ secrets.GH_PAT }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # sharp(이미지 리사이즈)가 필요하다
      - name: Install dependencies
        run: npm ci

      # 선택: GH_PAT 시크릿이 있으면 60일 토큰을 자동 연장하고 시크릿을 갱신한다.
      # 없으면 이 단계는 건너뛰고, 운영자가 ~50일마다 토큰을 수동 재발급하면 된다.
      - name: Refresh long-lived token
        id: refresh
        if: ${{ env.GH_PAT != '' }}
        env:
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
        run: node tools/fetch-instagram-posts.mjs --refresh-token

      - name: Store refreshed token
        if: ${{ steps.refresh.outputs.token != '' }}
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          NEW_TOKEN: ${{ steps.refresh.outputs.token }}
        run: gh secret set INSTAGRAM_ACCESS_TOKEN --body "$NEW_TOKEN"

      - name: Fetch Instagram posts
        env:
          INSTAGRAM_ACCESS_TOKEN: ${{ steps.refresh.outputs.token || secrets.INSTAGRAM_ACCESS_TOKEN }}
        run: node tools/fetch-instagram-posts.mjs

      - name: Commit Instagram data
        shell: bash
        run: |
          if [[ -z "$(git status --porcelain assets/instagram-posts.json assets/instagram)" ]]; then
            echo "No Instagram changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/instagram-posts.json assets/instagram
          git commit -m "Update Instagram posts"
          git push

      - name: Deploy source build to live repo
        if: ${{ env.BACKLINE_STAGE_LIVE_TOKEN != '' }}
        shell: bash
        run: |
          npm ci
          if [[ -n "$CMS_API_URL" ]]; then
            CMS_FETCH=1 CMS_REQUIRED=1 SITE_URL="$SITE_URL" npm run build
          else
            SITE_URL="$SITE_URL" npm run build
          fi

          git clone "https://x-access-token:${BACKLINE_STAGE_LIVE_TOKEN}@github.com/${LIVE_REPO}.git" ../backline-stage-live
          find ../backline-stage-live -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          rsync -a --delete --exclude='.git/' --exclude='*.DOCX' dist/ ../backline-stage-live/
          touch ../backline-stage-live/.nojekyll

          cd ../backline-stage-live
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Deploy Instagram posts" || exit 0
          git push
